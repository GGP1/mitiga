# Mitiga CI — Build, Test, and Security Scan
#
# Runs on every push and pull request. Gates merges on:
#   - Clean build (static, stripped binary)
#   - All tests passing with race detector
#   - No known Go vulnerabilities (govulncheck)
#   - No security issues in source (gosec)
#   - No vet warnings

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" ./cmd/mitiga

      - name: Test (race detector)
        run: go test -race -count=1 -timeout 120s ./...

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: Run gosec
        uses: securego/gosec@v2
        with:
          args: -fmt=json -out=gosec-results.json ./...

      - name: Upload gosec results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-results
          path: gosec-results.json
          retention-days: 30
